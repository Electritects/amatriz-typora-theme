<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="360" viewBox="0 0 1280 360" role="img" aria-labelledby="title desc">
  <title id="title">AMatriz Typora Theme banner</title>
  <desc id="desc">Matrix-inspired green-on-black banner for the AMatriz Typora theme.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#010401"/>
      <stop offset="0.45" stop-color="#030803"/>
      <stop offset="1" stop-color="#001400"/>
    </linearGradient>
    <radialGradient id="glow" cx="72%" cy="46%" r="60%">
      <stop offset="0" stop-color="#00ff41" stop-opacity="0.22"/>
      <stop offset="0.45" stop-color="#00b32d" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#00ff41" stop-opacity="0"/>
    </radialGradient>
    <pattern id="scanlines" width="8" height="8" patternUnits="userSpaceOnUse">
      <path d="M0 7.5H8" stroke="#00ff41" stroke-opacity="0.08" stroke-width="1"/>
    </pattern>
    <pattern id="grid" width="64" height="64" patternUnits="userSpaceOnUse">
      <path d="M64 0H0V64" fill="none" stroke="#00ff41" stroke-opacity="0.08" stroke-width="1"/>
    </pattern>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="textGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1280" height="360" fill="url(#bg)"/>
  <rect width="1280" height="360" fill="url(#glow)"/>
  <rect width="1280" height="360" fill="url(#grid)"/>
  <rect width="1280" height="360" fill="url(#scanlines)"/>

  <g font-family="Consolas, 'JetBrains Mono', 'Courier New', monospace" fill="#00ff41" opacity="0.42">
    <text x="36" y="42" font-size="18">01100001 01101101 01100001 01110100 01110010 01101001 01111010</text>
    <text x="1010" y="58" font-size="15">01010100</text>
    <text x="1088" y="84" font-size="15">01111001</text>
    <text x="1158" y="110" font-size="15">01110000</text>
    <text x="1018" y="138" font-size="15">01101111</text>
    <text x="1094" y="164" font-size="15">01110010</text>
    <text x="1166" y="190" font-size="15">01100001</text>
    <text x="1028" y="218" font-size="15">CSS</text>
    <text x="1098" y="244" font-size="15">PDF</text>
    <text x="1168" y="270" font-size="15">DOCS</text>
    <text x="38" y="318" font-size="15">#write { color: #00e63a; background: #030803; }</text>
  </g>

  <g opacity="0.28" stroke="#00ff41" stroke-width="1" fill="none">
    <path d="M790 42V318"/>
    <path d="M838 80V300"/>
    <path d="M886 24V336"/>
    <path d="M934 62V278"/>
    <path d="M982 34V330"/>
    <path d="M1030 96V312"/>
    <path d="M1078 50V338"/>
    <path d="M1126 76V292"/>
    <path d="M1174 28V332"/>
  </g>

  <g transform="translate(74 92)">
    <rect x="0" y="0" width="656" height="176" rx="14" fill="#000000" fill-opacity="0.42" stroke="#00ff41" stroke-opacity="0.28"/>
    <text x="34" y="68" font-family="Consolas, 'JetBrains Mono', 'Courier New', monospace" font-size="72" font-weight="700" fill="#00ff41" filter="url(#textGlow)">AMatriz</text>
    <text x="38" y="112" font-family="Consolas, 'JetBrains Mono', 'Courier New', monospace" font-size="28" font-weight="600" fill="#66ff99">Typora Theme</text>
    <text x="38" y="148" font-family="Consolas, 'JetBrains Mono', 'Courier New', monospace" font-size="20" fill="#00b32d">green-on-black docs | code | PDF export</text>
  </g>

  <g transform="translate(794 110)" filter="url(#softGlow)">
    <rect x="0" y="0" width="366" height="126" rx="10" fill="#020804" stroke="#00ff41" stroke-opacity="0.44"/>
    <path d="M24 32H342M24 64H342M24 96H250" stroke="#003b00" stroke-width="2"/>
    <text x="28" y="45" font-family="Consolas, 'JetBrains Mono', 'Courier New', monospace" font-size="18" fill="#00ff41"># AMatriz</text>
    <text x="28" y="77" font-family="Consolas, 'JetBrains Mono', 'Courier New', monospace" font-size="18" fill="#33ff66">print-color-adjust: exact;</text>
    <text x="28" y="109" font-family="Consolas, 'JetBrains Mono', 'Courier New', monospace" font-size="18" fill="#00b32d">@page { margin: 0; }</text>
  </g>

  <rect x="20" y="20" width="1240" height="320" rx="18" fill="none" stroke="#00ff41" stroke-opacity="0.22"/>
</svg>
